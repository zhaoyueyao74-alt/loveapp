name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Generate Android project structure
        run: |
          # 如果 android 文件夹不存在，则创建完整的 Flutter 项目
          # 这会自动生成 android/ 目录，同时保留现有的 lib/ 和 pubspec.yaml
          flutter create --platforms=android --no-overwrite . || true

      - run: flutter pub get

      - run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: love-letter-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
